<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragments & Echoes</title>
    <style>
        :root {
            --bg-color: #08080b;
            --text-primary: #e4e4ed;
            --text-secondary: #5a5a6e;
            --accent: #a385b9; /* Soft artsy violet */
            --accent-dim: rgba(163, 133, 185, 0.15);
            --nav-bg: rgba(8, 8, 11, 0.9);
            --border: #161622;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Fixed Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 2.5rem;
            background: var(--nav-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
        }

        .nav-logo {
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
            opacity: 0.8;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap;
        }

        .nav-links a:hover {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-dim);
        }

        /* Clean Vertical Layout Frame */
        main {
            width: 100%;
            max-width: 700px; /* narrowed slightly for an editorial look */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: auto; 
            padding-top: 140px; 
            padding-bottom: 60px;
        }

        /* Top Layer: The Quote Context */
        .statement-axis {
            margin-bottom: 3.5rem;
        }

        .home-quote {
            font-size: 1.25rem;
            color: #b5b5c3;
            line-height: 1.8;
            font-style: italic;
            margin-bottom: 0.8rem;
        }

        .quote-source {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
        }

        /* Middle Layer: Strong Brand Focus */
        .brand-axis {
            margin-bottom: 4rem;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 2.5rem 0;
            width: 100%;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: -2px;
            line-height: 0.95;
            background: linear-gradient(to bottom, #e4e4ed 40%, #4a4a5a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Bottom Layer: Action Group */
        .cta-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        /* Striking Monolith Action Link */
        .monolith-btn {
            display: inline-block;
            font-family: monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            color: #ffffff;
            background: rgba(163, 133, 185, 0.08);
            text-decoration: none;
            border: 1px solid var(--accent);
            padding: 0.9rem 2.25rem;
            box-shadow: 0 0 15px var(--accent-dim);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .monolith-btn:hover {
            background: var(--accent);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(163, 133, 185, 0.4);
            transform: translateY(-2px);
        }

        /* Repository Text Context Tag */
        .repo-notice {
            display: block;
            font-family: 'Georgia', serif;
            font-size: 0.75rem;
            font-style: italic;
            line-height: 1.5;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            max-width: 320px;
        }

        /* Footer */
        footer {
            font-family: monospace;
            font-size: 0.75rem;
            color: rgba(110, 110, 128, 0.3);
            letter-spacing: 1.5px;
            text-align: center;
            width: 100%;
            padding-top: 20px;
        }

        /* Responsive collapse for tablets/phones */
        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 1.5rem;
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                gap: 1.2rem;
            }

            main {
                padding-top: 160px;
            }

            h1 { 
                font-size: 3.2rem;
                letter-spacing: -1px;
            }

            .statement-axis {
                margin-bottom: 2.5rem;
            }

            .brand-axis {
                margin-bottom: 3rem;
                padding: 2rem 0;
            }

            .home-quote {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 380px) {
            .nav-links {
                gap: 0.8rem;
            }
            h1 {
                font-size: 2.6rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="nav-logo">// f&e</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="quotes">Quotes</a></li>
            <li><a href="poems">Poems</a></li>
            <li><a href="cinema">Cinema</a></li>
            <li><a href="about">About</a></li>
        </ul>
    </nav>

    <main>
        <!-- Layer 1: The Quote Intro -->
        <div class="statement-axis">
            <p class="home-quote">
                "We used to look up at the sky and wonder at our place in the stars."
            </p>
            <span class="quote-source">— Interstellar</span>
        </div>

        <!-- Layer 2: Main Identity Anchor -->
        <div class="brand-axis">
            <h1>fragments<br>& echoes</h1>
        </div>
        
        <!-- Layer 3: Lower Interaction Terminal -->
        <div class="cta-container">
            <a href="/monolith" class="monolith-btn">
                → Enter Monolith
            </a>
            <span class="repo-notice">
                this is not my beautiful house, this is not my beautiful site
            </span>
        </div>
    </main>

    <footer>
        [ digital scrapbook // 2026 ]
    </footer>

</body>
</html>
