<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragments & Echoes</title>
    <style>
        :root {
            --bg-color: #08080b;
            --text-primary: #e4e4ed;
            --text-secondary: #5a5a6e;
            --accent: #a385b9; /* Soft artsy violet */
            --accent-dim: rgba(163, 133, 185, 0.15);
            --nav-bg: rgba(8, 8, 11, 0.85);
            --border: #161622;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden; 
            position: relative;
        }

        /* Fixed Background Layer: Prevents mobile scroll snapping/jumping */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: 
                linear-gradient(
                    to bottom, 
                    rgba(8, 8, 11, 0.95) 0%, 
                    rgba(8, 8, 11, 0.4) 40%, 
                    rgba(8, 8, 11, 0.4) 70%, 
                    #08080b 100%
                ),
                url('https://image.tmdb.org/t/p/original/ignr9C0hv1iMLDUWrX90lM6Bkmk.jpg');
            background-size: cover;
            background-position: center 35%;
            background-repeat: no-repeat;
            pointer-events: none; /* Allows clicks to pass through to links */
        }

        /* Fixed Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 2.5rem;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(22, 22, 34, 0.3);
        }

        .nav-logo {
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
            opacity: 0.8;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap;
        }

        .nav-links a:hover {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-dim);
        }

        /* Artsy Split Layout Frame */
        main {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            align-items: center;
            gap: 4rem;
            margin: auto auto 2rem auto; 
            padding-top: 140px; 
        }

        /* Left side: Big, structural typography */
        .brand-axis {
            text-align: right;
        }

        h1 {
            font-size: 4rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: -2px;
            line-height: 0.95;
            background: linear-gradient(to bottom, #e4e4ed 40%, #72728a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        /* Right side: The Statement Content */
        .statement-axis {
            border-left: 1px solid rgba(90, 90, 110, 0.3);
            padding: 1.5rem 0 1.5rem 3rem;
            backdrop-filter: blur(2px);
        }

        .home-quote {
            font-size: 1.25rem;
            color: #b5b5c3;
            line-height: 1.8;
            font-style: italic;
            margin-bottom: 0.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .quote-source {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
        }

        /* Grouped Layout Container */
        .cta-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.2rem; 
            margin-bottom: auto; 
            padding-bottom: 2rem;
            width: 100%;
        }

        /* New contextual subtext quote */
        .repo-notice {
            display: block;
            font-family: 'Georgia', serif;
            font-size: 1rem; 
            font-style: italic;
            line-height: 1.5;
            color: #7b7b93;
            letter-spacing: 0.5px;
            max-width: 400px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        /* Striking Monolith Action Link */
        .monolith-btn {
            display: inline-block;
            font-family: monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            color: #ffffff;
            background: rgba(8, 8, 11, 0.6);
            text-decoration: none;
            border: 1px solid var(--accent);
            padding: 0.9rem 2.25rem; 
            box-shadow: 0 0 15px var(--accent-dim);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            backdrop-filter: blur(4px);
        }

        .monolith-btn:hover {
            background: var(--accent);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(163, 133, 185, 0.5);
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            font-family: monospace;
            font-size: 0.75rem;
            color: rgba(110, 110, 128, 0.5);
            letter-spacing: 1.5px;
            text-align: center;
            width: 100%;
            padding-top: 20px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.9);
        }

        /* Responsive collapse for tablets/phones */
        @media (max-width: 768px) {
            body::before {
                background-position: center center;
            }

            nav {
                padding: 1.5rem 1.5rem;
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                gap: 1.2rem;
            }

            .nav-links a {
                font-size: 0.75rem;
                letter-spacing: 1px;
            }

            main {
                grid-template-columns: 1fr;
                gap: 2.5rem;
                text-align: center;
                padding-top: 140px; 
                margin-bottom: 3rem;
            }

            .brand-axis { 
                text-align: center; 
            }

            h1 { 
                font-size: 2.8rem; 
                letter-spacing: -1px;
                margin-bottom: 0.5rem; 
            }

            .statement-axis {
                border-left: none;
                border-top: 1px solid rgba(90, 90, 110, 0.3);
                padding: 2rem 1rem 0 1rem;
            }

            .home-quote {
                font-size: 1.1rem;
            }

            .cta-container {
                padding-bottom: 1rem;
            }
        }

        @media (max-width: 380px) {
            .nav-links {
                gap: 0.8rem;
            }
            h1 {
                font-size: 2.4rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="nav-logo">// f&e</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="quotes">Quotes</a></li>
            <li><a href="poems">Poems</a></li>
            <li><a href="cinema">Cinema</a></li>
            <li><a href="about">About</a></li>
        </ul>
    </nav>

    <main>
        <div class="brand-axis">
            <h1>fragments<br>& echoes</h1>
        </div>
        
        <div class="statement-axis">
            <p class="home-quote">
                "We used to look up at the sky and wonder at our place in the stars."
            </p>
            <span class="quote-source">— Interstellar</span>
        </div>
    </main>

    <div class="cta-container">
        <span class="repo-notice">
            When you gotta go, you gotta go
        </span>
        <a href="/monolith" class="monolith-btn">
            → Enter Monolith
        </a>
    </div>

    <footer>
        [ digital scrapbook // 2026 ]
    </footer>

</body>
</html>
