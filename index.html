<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragments & Echoes</title>
    <style>
        :root {
            --bg-color: #0b0b0e;
            --text-primary: #e4e4ed;
            --text-secondary: #6e6e80;
            --accent: #a385b9; /* Soft, artsy violet */
            --accent-dim: rgba(163, 133, 185, 0.3);
            --nav-bg: rgba(11, 11, 14, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden; /* Keeps the minimalist, single-page look */
        }

        /* Fixed Navigation Bar at Top */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: var(--nav-bg);
            backdrop-filter: blur(8px); /* Subtle glass effect */
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            z-index: 100;
        }

        .nav-logo {
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-dim);
        }

        /* Central Minimalist Landing Area */
        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-grow: 1;
            padding: 2rem;
            max-width: 600px;
            margin-top: 60px; /* Offset for fixed nav */
        }

        h1 {
            font-size: 3rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .divider {
            width: 40px;
            height: 1px;
            background-color: var(--accent);
            margin: 1.5rem 0;
            opacity: 0.5;
        }

        /* A singular, striking quote just to anchor the home page */
        .home-quote {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            font-style: italic;
        }

        /* Footer */
        footer {
            padding-bottom: 2rem;
            font-family: monospace;
            font-size: 0.75rem;
            color: rgba(110, 110, 128, 0.5);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav>
        <a href="index.html" class="nav-logo">// f&e</a>
        <ul class="nav-links">
            <li><a href="quotes.html">Quotes</a></li>
            <li><a href="poems.html">Poems</a></li>
            <li><a href="cinema.html">Cinema</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <!-- Main Entry Screen -->
    <main>
        <h1>fragments & echoes</h1>
        <div class="divider"></div>
        <p class="home-quote">
            "We read to know that we are not alone."
        </p>
    </main>

    <!-- Footer -->
    <footer>
        [ digital scrapbook / 2026 ]
    </footer>

</body>
</html>
