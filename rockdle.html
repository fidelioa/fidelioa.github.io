<script>
    const START_WORD = "GOOD";
    const TARGET_WORD = "HELL";
    
    // Core 4-letter word list optimized for paths leading from GOOD to HELL
    const WORD_LIST = ["GOOD","GOAD","GOLD","HOLD","HOOD","WOOD","FOOD","BOLD","FOLD","MOLD","TOLD", "HEAD", "HEAL", "HEAR", "HEAT", "HELL", "HELM", "HELP", "HEMP", "HERE", "HERO", "HOLE", "HALL", "SELL", "TELL", "WELL", "FELL", "BELL", "CELL"];
    const SOLVER_DICTIONARY = new Set(WORD_LIST);

    let history = [START_WORD];

    const ladderEl = document.getElementById('ladder');
    const inputEl = document.getElementById('guess-input');
    const submitBtn = document.getElementById('submit-btn');
    const undoBtn = document.getElementById('undo-btn');
    const giveUpBtn = document.getElementById('giveup-btn');
    const messageEl = document.getElementById('message-box');
    const gameControls = document.getElementById('game-controls');
    const winScreen = document.getElementById('win-screen');
    const winStats = document.getElementById('win-stats');
    const winTitle = document.getElementById('win-title');

    function initGame() {
        history = [START_WORD];
        renderLadder();
        inputEl.value = '';
        showMessage('', '');
        gameControls.style.display = 'block';
        winScreen.style.display = 'none';
        enableUI(true);
        updateUndoButtonState();
    }

    function renderLadder() {
        ladderEl.innerHTML = '';
        history.forEach((word, index) => {
            let type = '';
            let displayWord = word;
            
            if (index === 0) {
                type = 'start';
            } else if (word.startsWith('*')) { 
                type = 'ai-path'; 
                displayWord = word.replace('*', ''); 
            } else if (word === TARGET_WORD) {
                type = 'end';
            }
            
            const stepDiv = document.createElement('div');
            stepDiv.className = `ladder-step ${type}`;
            
            const wordSpan = document.createElement('span');
            wordSpan.className = 'step-word';
            wordSpan.textContent = displayWord;

            const countSpan = document.createElement('span');
            countSpan.className = 'step-count';
            countSpan.textContent = index === 0 ? 'START' : `Step ${index}`;

            stepDiv.appendChild(wordSpan);
            stepDiv.appendChild(countSpan);
            ladderEl.appendChild(stepDiv);
        });
        ladderEl.scrollTop = ladderEl.scrollHeight;
    }

    function checkOneLetterDiff(word1, word2) {
        if (word1.length !== word2.length) return false;
        let diff = 0;
        for (let i = 0; i < word1.length; i++) {
            if (word1[i] !== word2[i]) diff++;
        }
        return diff === 1;
    }

    function enableUI(enabled) {
        inputEl.disabled = !enabled;
        submitBtn.disabled = !enabled;
        giveUpBtn.disabled = !enabled;
        undoBtn.disabled = !enabled ? true : (history.length <= 1);
        if(enabled) inputEl.focus();
    }

    function updateUndoButtonState() {
        undoBtn.disabled = (history.length <= 1);
    }

    async function isValidEnglishWord(word) {
        if (SOLVER_DICTIONARY.has(word)) return true;
        try {
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
            return response.ok;
        } catch (error) {
            return true; 
        }
    }

    // BFS Shortest path calculator
    function findShortestPath(start, target) {
        let queue = [[start, [start]]];
        let visited = new Set([start]);

        while (queue.length > 0) {
            let [current, path] = queue.shift();

            if (current === target) return path;

            for (let word of SOLVER_DICTIONARY) {
                if (!visited.has(word) && checkOneLetterDiff(current, word)) {
                    visited.add(word);
                    queue.push([word, [...path, word]]);
                }
            }
        }
        return null;
    }

    async function handleGuess() {
        const guess = inputEl.value.trim().toUpperCase();
        const currentWord = history[history.length - 1];

        showMessage('', '');

        if (guess.length !== 4) {
            showMessage("Word must be exactly 4 letters long.", "error");
            return;
        }
        if (history.includes(guess)) {
            showMessage("You already used that word!", "error");
            return;
        }
        if (!checkOneLetterDiff(currentWord, guess)) {
            showMessage(`"${guess}" must change exactly ONE letter from "${currentWord}".`, "error");
            return;
        }

        showMessage("Checking word...", "info");
        enableUI(false);

        const isValid = await isValidEnglishWord(guess);

        if (!isValid) {
            showMessage(`"${guess}" is not a recognized English word.`, "error");
            enableUI(true);
            return;
        }

        showMessage('', '');
        history.push(guess);
        renderLadder();
        inputEl.value = '';
        enableUI(true);
        updateUndoButtonState();

        if (guess === TARGET_WORD) {
            endGame(true);
        }
    }

    function handleUndo() {
        if (history.length > 1) {
            history.pop();
            renderLadder();
            showMessage('Last step removed.', 'info');
            updateUndoButtonState();
            inputEl.focus();
        }
    }

    function handleGiveUp() {
        // Clean the current word in case there's an artificial character
        let currentWord = history[history.length - 1];
        if (currentWord.startsWith('*')) currentWord = currentWord.replace('*', '');

        const missingPath = findShortestPath(currentWord, TARGET_WORD);

        if (missingPath && missingPath.length > 1) {
            for(let i = 1; i < missingPath.length; i++) {
                history.push("*" + missingPath[i]);
            }
        } else {
            const directPath = findShortestPath(START_WORD, TARGET_WORD);
            if (directPath) {
                history = [START_WORD];
                for(let i = 1; i < directPath.length; i++) {
                    history.push("*" + directPath[i]);
                }
            }
        }
        renderLadder();
        endGame(false);
    }

    function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = `message ${type}`;
    }

    function endGame(isWin) {
        gameControls.style.display = 'none';
        winScreen.style.display = 'block';
        if (isWin) {
            winTitle.textContent = "🎉 Success! You Did It!";
            winTitle.className = "success";
            winStats.textContent = `You completed the ladder in ${history.length - 1} steps.`;
        } else {
            winTitle.textContent = "🏳️ Given Up";
            winTitle.className = "info";
            winStats.textContent = `The AI autofilled the shortest path to the finish line.`;
        }
    }

    // Explicitly assigning resetGame to the window scope so inline HTML onclick works cleanly
    window.resetGame = function() {
        initGame();
    }

    submitBtn.addEventListener('click', handleGuess);
    undoBtn.addEventListener('click', handleUndo);
    giveUpBtn.addEventListener('click', handleGiveUp);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !inputEl.disabled) handleGuess();
    });

    initGame();
</script>
