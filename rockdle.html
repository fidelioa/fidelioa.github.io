<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctordle - Infinite Medical Cases</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 5px;
        }

        .case-number {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tracker {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .box {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .box.correct { background-color: var(--success); color: white; border-color: var(--success); }
        .box.wrong { background-color: var(--error); color: white; border-color: var(--error); }

        .clues-section {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            min-height: 120px;
        }

        .clue-item {
            margin: 8px 0;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--border);
            animation: fadeIn 0.4s ease-in-out;
        }
        .clue-item:last-child { border-bottom: none; }

        .search-container {
            position: relative;
            margin-bottom: 16px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .dropdown div {
            padding: 10px 12px;
            cursor: pointer;
        }
        .dropdown div:hover { background-color: #f1f5f9; }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--border); cursor: not-allowed; }

        .result {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        .result.win { background-color: #dcfce7; color: #166534; }
        .result.loss { background-color: #fee2e2; color: #991b1b; }

        #next-btn {
            margin-top: 12px;
            background-color: #1e293b;
            display: none;
        }
        #next-btn:hover { background-color: #0f172a; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Doctordle</h1>
    <div class="case-number" id="case-title">Case Study</div>
    
    <!-- Guess Trackers -->
    <div class="tracker" id="tracker">
        <div class="box" id="b1">1</div>
        <div class="box" id="b2">2</div>
        <div class="box" id="b3">3</div>
        <div class="box" id="b4">4</div>
        <div class="box" id="b5">5</div>
        <div class="box" id="b6">6</div>
        <div class="box" id="b7">7</div>
    </div>

    <!-- Clues Display -->
    <div class="clues-section">
        <h3>Patient Clues:</h3>
        <div id="clues-list"></div>
    </div>

    <!-- Search Dropdown Selection -->
    <div class="search-container" id="controls-container">
        <input type="text" id="diagnosis-input" placeholder="Search diagnosis..." autocomplete="off">
        <div class="dropdown" id="dropdown-list"></div>
    </div>
    
    <button id="submit-btn" disabled>Submit Guess</button>
    <div class="result" id="result-message"></div>
    <button id="next-btn">Next Case ➔</button>
</div>

<script>
    // --- CASES DATABASE ---
    const caseDatabase = [
        {
            disease: "Appendicitis",
            clues: [
                "Initial symptom: Vague, dull pain localized right around the umbilicus (belly button).",
                "Associated signs: Low-grade fever, mild nausea, and a sudden loss of appetite (anorexia).",
                "Pain shift: Over several hours, the pain migrates cleanly down into the Right Lower Quadrant (RLQ).",
                "Physical Exam Sign 1: Sharp localized tenderness noted specifically at McBurney's point.",
                "Physical Exam Sign 2: Positive Rovsing's sign (pressing down on the left side causes pain on the right side).",
                "Laboratory findings: Elevated White Blood Cell count (leukocytosis) with a neutrophil left shift.",
                "Definitive Imaging: Ultrasound or CT scan reveals a blind-ending, inflamed appendix measuring > 6mm."
            ]
        },
        {
            disease: "Acute Cholecystitis",
            clues: [
                "Initial presentation: Sudden, severe pain in the Right Upper Quadrant (RUQ) or epigastrium.",
                "Radiation pattern: The abdominal pain frequently radiates straight through to the right scapula or shoulder.",
                "Trigger event: Symptoms classically flare up 1 to 2 hours after consuming a high-fat meal.",
                "Physical Exam Sign 1: Positive Murphy's Sign (the patient abruptly stops breathing in during RUQ palpation).",
                "Associated labs: Mildly elevated Leukocytes, with normal or only slightly elevated Bilirubin levels.",
                "Risk Profile: Patient often fits the classic demographic profile: Female, Forty, Fertile, and Fat.",
                "Definitive Imaging: Abdominal ultrasound shows gallbladder wall thickening (>4mm) and pericholecystic fluid."
            ]
        },
        {
            disease: "Pancreatitis",
            clues: [
                "Initial presentation: Severe, steady epigastric abdominal pain.",
                "Radiation pattern: The boring pain penetrates completely straight through to the patient's upper back.",
                "Alleviating factor: The pain is often partially relieved when the patient sits up and leans forward.",
                "Associated symptoms: Severe, intractable vomiting that does not relieve the underlying pain.",
                "Common etiologies: Most cases are triggered either by a history of chronic alcohol abuse or gallstones.",
                "Physical Exam Signs (Rare): Cullen's sign (periumbilical bruising) or Grey Turner's sign (flank bruising).",
                "Definitive Diagnostic Labs: Serum Amylase and Lipase levels are elevated to more than 3 times the upper limit of normal."
            ]
        },
        {
            disease: "Diverticulitis",
            clues: [
                "Initial presentation: Constant, aching pain predominantly localized in the Left Lower Quadrant (LLQ).",
                "Associated signs: Altered bowel habits (constipation or diarrhea) accompanied by low-grade fever.",
                "Risk Profile: Much more frequently diagnosed in elderly patients or populations with a low-fiber diet.",
                "Physical Exam Sign: Localized tenderness, guarding, or a palpable mass in the lower left abdominal sector.",
                "Laboratory findings: Elevated C-Reactive Protein (CRP) and Leukocytosis indicating active inflammation.",
                "Contraindication: Barium enemas and traditional Colonoscopies are strictly avoided in the acute phase due to perforation risk.",
                "Definitive Imaging: Abdominal/Pelvic CT scan reveals localized colonic wall thickening and outpouching fat stranding."
            ]
        },
        {
            disease: "Kidney Stones",
            clues: [
                "Initial presentation: Sudden, agonizing, crampy flank pain that comes and goes in waves (colic).",
                "Radiation pattern: The excruciating pain radiates downward from the flank into the groin, testicle, or labia.",
                "Patient behavior: The patient is visibly writhing in pain, completely unable to find a comfortable position to sit or lie down.",
                "Associated symptoms: Microscopic or gross blood visible in the urine sample (hematuria), with frequent urges to void.",
                "Laboratory findings: Urinalysis is negative for nitrites and bacteria, but heavily saturated with crystals.",
                "Common composition: The vast majority of these obstructing objects are made of Calcium Oxalate.",
                "Definitive Imaging: A non-contrast helical CT scan of the abdomen and pelvis reveals an obstructing calcification."
            ]
        }
    ];

    // --- SEARCH DICTIONARY FOR THE DROPDOWN ---
    const dictionary = [
        "Appendicitis", "Acute Cholecystitis", "Pancreatitis", "Diverticulitis", "Kidney Stones",
        "Gastroenteritis", "Crohn's Disease", "Ulcerative Colitis", "Peptic Ulcer Disease",
        "Ectopic Pregnancy", "Ovarian Torsion", "Urinary Tract Infection", "Pneumonia", 
        "Pulmonary Embolism", "Myocardial Infarction", "Aortic Dissection"
    ].sort();

    // --- GAME STATE VARIABLES ---
    let currentCaseIndex = 0;
    let currentAttempt = 1;
    const maxAttempts = 7;

    // --- DOM ELEMENTS ---
    const caseTitle = document.getElementById("case-title");
    const input = document.getElementById("diagnosis-input");
    const dropdown = document.getElementById("dropdown-list");
    const submitBtn = document.getElementById("submit-btn");
    const nextBtn = document.getElementById("next-btn");
    const cluesList = document.getElementById("clues-list");
    const resultMessage = document.getElementById("result-message");

    // --- GAME ENGINE LOGIC ---
    function startNewGame() {
        // Reset state variables
        currentAttempt = 1;
        cluesList.innerHTML = "";
        resultMessage.style.display = "none";
        input.value = "";
        input.disabled = false;
        submitBtn.disabled = true;
        nextBtn.style.display = "none";
        document.getElementById("controls-container").style.display = "block";
        submitBtn.style.display = "block";

        // Update UI Title
        caseTitle.textContent = `Case Study #${currentCaseIndex + 1} of ${caseDatabase.length}`;

        // Reset Tracker Boxes
        for (let i = 1; i <= maxAttempts; i++) {
            const box = document.getElementById(`b${i}`);
            box.className = "box";
            box.textContent = i;
        }

        // Show first clue
        revealNextClue(0);
    }

    function revealNextClue(index) {
        const activeCase = caseDatabase[currentCaseIndex];
        const div = document.createElement("div");
        div.className = "clue-item";
        div.innerHTML = `<strong>Clue ${index + 1}:</strong> ${activeCase.clues[index]}`;
        cluesList.appendChild(div);
    }

    // Search input Filtering
    input.addEventListener("input", () => {
        const val = input.value.toLowerCase();
        dropdown.innerHTML = "";
        if (!val) {
            dropdown.style.display = "none";
            submitBtn.disabled = true;
            return;
        }

        const matches = dictionary.filter(d => d.toLowerCase().includes(val));
        if (matches.length > 0) {
            dropdown.style.display = "block";
            matches.forEach(match => {
                const item = document.createElement("div");
                item.textContent = match;
                item.addEventListener("click", () => {
                    input.value = match;
                    dropdown.style.display = "none";
                    submitBtn.disabled = false;
                });
                dropdown.appendChild(item);
            });
        } else {
            dropdown.style.display = "none";
            submitBtn.disabled = true;
        }
    });

    // Close dropdown on click-away
    document.addEventListener("click", (e) => {
        if (e.target !== input && e.target !== dropdown) {
            dropdown.style.display = "none";
        }
    });

    // Handle submission check
    submitBtn.addEventListener("click", () => {
        const userGuess = input.value.trim();
        const activeCase = caseDatabase[currentCaseIndex];
        const currentBox = document.getElementById(`b${currentAttempt}`);

        if (userGuess.toLowerCase() === activeCase.disease.toLowerCase()) {
            currentBox.className = "box correct";
            endGame(true);
        } else {
            currentBox.className = "box wrong";
            if (currentAttempt < maxAttempts) {
                revealNextClue(currentAttempt);
                currentAttempt++;
                input.value = "";
                submitBtn.disabled = true;
            } else {
                endGame(false);
            }
        }
    });

    function endGame(isWin) {
        const activeCase = caseDatabase[currentCaseIndex];
        input.disabled = true;
        submitBtn.disabled = true;
        document.getElementById("controls-container").style.display = "none";
        submitBtn.style.display = "none";
        
        if (isWin) {
            resultMessage.textContent = `Correct! You diagnosed ${activeCase.disease} on attempt ${currentAttempt}/${maxAttempts}.`;
            resultMessage.className = "result win";
        } else {
            resultMessage.textContent = `Case Closed. The correct diagnosis was ${activeCase.disease}.`;
            resultMessage.className = "result loss";
        }
        resultMessage.style.display = "block";
        nextBtn.style.display = "block";
    }

    // Move to next case index loop
    nextBtn.addEventListener("click", () => {
        currentCaseIndex = (currentCaseIndex + 1) % caseDatabase.length;
        startNewGame();
    });

    // Initialize first case run
    startNewGame();
</script>

</body>
</html>
