<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive High-Yield Cardiology QBank: JVP & Murmurs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen text-slate-850 flex flex-col antialiased">

    <nav class="bg-[#1a365d] border-b border-[#2c5282] px-6 py-4 sticky top-0 z-50 text-white shadow-md">
        <div class="max-w-5xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-red-500/10 p-2 rounded-xl text-red-400 border border-red-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 animate-pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </div>
                <div>
                    <h1 class="text-base font-extrabold tracking-tight">CardioQBank</h1>
                    <p class="text-[10px] text-blue-300 font-mono tracking-wider uppercase">JVP & Murmurs Simulator</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <a href="../" id="nav-blocks-link" class="text-sm font-semibold hover:text-slate-200 transition text-slate-200 py-1.5 px-3 rounded-lg hover:bg-white/5 flex items-center gap-1.5">
                    Dashboard
                </a>
                <span class="text-slate-500">|</span>
                
                <button id="google-login-btn" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2 rounded-lg shadow transition flex items-center gap-1.5">
                    Sign In
                </button>

                <div id="nav-user-profile" style="display: none;" class="relative flex items-center">
                    <img id="nav-user-photo" src="" alt="User Photo" class="w-9 h-9 rounded-full border-2 border-blue-400 cursor-pointer" />
                    <div id="profile-dropdown" class="absolute right-0 top-11 bg-white border border-slate-200 text-slate-800 rounded-xl shadow-xl w-60 py-3 hidden z-50">
                        <div class="px-4 py-2 border-b border-slate-100">
                            <p id="user-name" class="font-extrabold text-sm text-slate-900 truncate">Loading User...</p>
                            <p id="user-email" class="text-xs text-slate-500 truncate mt-0.5"></p>
                        </div>
                        <button id="logout-btn" class="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 font-bold transition flex items-center gap-1.5">
                            Sign Out
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 mt-6 w-full flex-grow">
        <div class="bg-white border border-slate-200 rounded-xl p-4 flex flex-wrap justify-between items-center gap-4 shadow-sm mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-slate-100 text-slate-700 font-bold px-3 py-1.5 rounded-lg text-sm border border-slate-200" id="tracker-display">
                    Question 1 of 7
                </div>
                <div class="w-32 bg-slate-200 rounded-full h-2 hidden sm:block">
                    <div id="progress-bar-fill" class="bg-blue-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 text-slate-700 bg-slate-100 px-3.5 py-1.5 rounded-lg font-mono font-bold text-sm border border-slate-200" id="clock-display">
                    90:00
                </div>
                <button id="pause-btn-top" class="bg-amber-500 hover:bg-amber-600 text-white font-bold text-xs px-3.5 py-2.5 rounded-lg transition shadow-sm cursor-pointer">
                    Pause Quiz
                </button>
                <button id="resume-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs px-3.5 py-2 rounded-lg transition shadow-sm hidden">
                    Resume Progress
                </button>
            </div>
        </div>

        <div id="cloud-sync-alert" class="bg-indigo-50 border border-indigo-200 text-indigo-950 p-4 rounded-xl flex items-center justify-between gap-4 shadow-sm mb-6 hidden">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-100 text-indigo-700 p-2.5 rounded-lg">🚀</div>
                <div>
                    <p class="text-sm font-bold">Cloud Progress Detected</p>
                    <p class="text-xs text-indigo-700">A previous active session was found on your account.</p>
                </div>
            </div>
            <button id="cloud-restore-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2.5 rounded-lg transition">
                Restore Progress
            </button>
        </div>

        <div id="qbank-card" class="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-sm">
            <div id="vignette-container" class="text-slate-800 text-base md:text-[17px] font-medium leading-relaxed mb-6 text-justify">
                Loading board question stem...
            </div>

            <ul id="choices-container" class="space-y-3 mb-8"></ul>

            <div id="meta-feedback" class="border-t border-slate-100 pt-6 mt-6 hidden">
                <div id="evaluation-banner" class="mb-4 p-4 rounded-xl font-bold text-sm"></div>
                <div class="bg-blue-50/50 border border-blue-100 p-5 rounded-xl text-blue-900 mb-4">
                    <h4 class="font-extrabold text-xs uppercase tracking-widest text-blue-950 mb-2">Clinical Explanation</h4>
                    <p id="explanation-text" class="text-sm leading-relaxed text-justify"></p>
                </div>
                <div class="bg-amber-50/40 border border-amber-200/50 p-4 rounded-xl text-amber-950">
                    <h4 class="font-extrabold text-xs uppercase tracking-widest text-amber-950 mb-1">Educational Objective</h4>
                    <p id="objective-text" class="text-[13px] italic text-slate-700"></p>
                </div>
            </div>

            <div class="flex justify-between items-center border-t border-slate-100 pt-6 mt-8">
                <button id="submit-action-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-sm px-6 py-3 rounded-xl transition shadow">
                    Submit Answer
                </button>
                <button id="next-action-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold text-sm px-6 py-3 rounded-xl transition shadow hidden">
                    Next Question
                </button>
            </div>
        </div>

        <div id="end-block-results" class="bg-white border border-slate-200 rounded-2xl p-8 text-center shadow-md mb-12 hidden">
            <h2 class="text-2xl font-extrabold text-slate-900 mb-2">Block Completed!</h2>
            <div class="bg-slate-50 rounded-xl p-4 max-w-xs mx-auto border border-slate-100 mb-6">
                <p id="score-text-output" class="text-3xl font-extrabold text-blue-600 font-mono">0 / 7</p>
            </div>
            <button onclick="goToDashboard()" class="bg-[#1a365d] hover:bg-blue-900 text-white font-bold px-6 py-3.5 rounded-xl shadow transition">
                Return to Dashboard
            </button>
        </div>
    </div>

    <script type="module" src="main.js"></script>

    <script>
        const questions = [
            {
                vignette: "A 64-year-old male presents with progressive dyspnea on exertion and episodic lightheadedness over the past 6 months. Physical examination reveals a delayed, low-amplitude carotid pulse (pulsus parvus et tardus). On cardiac auscultation, a harsh, crescendo-decrescendo systolic murmur is heard loudest at the right upper sternal border, radiating to the carotids. The second heart sound (S2) is single and paradoxically split. Which of the following findings is most expected?",
                choices: ["A. Softening of the murmur with a handgrip maneuver", "B. Softening of the murmur during Valsalva", "C. Intensification of the murmur upon standing", "D. Softening of the murmur following a PVC"],
                answerLetter: "A",
                explanation: "Handgrip increases afterload. In Aortic Stenosis, this reduces the pressure gradient across the stenotic valve, reducing forward flow velocity and softening the murmur.",
                objective: "Handgrip maneuver increases afterload, which decreases flow velocity across the aortic valve, softening an AS murmur."
            },
            {
                vignette: "A 45-year-old female presents with fatigue and peripheral edema. On examination, her jugular venous pressure is elevated at 12 cm H2O. Inspection of the jugular venous waveform reveals an exceptionally prominent, rapid descent occurring immediately after the second heart sound. A sharp, high-pitched sound is heard early in diastole along the left sternal border. Diagnosis?",
                choices: ["A. Cardiac tamponade", "B. Constrictive pericarditis", "C. Severe tricuspid regurgitation", "D. Tricuspid stenosis"],
                answerLetter: "B",
                explanation: "The prominent rapid y descent (Friedreich's sign) combined with an early diastolic pericardial knock sound points directly to constrictive pericarditis.",
                objective: "Constrictive pericarditis exhibits an abrupt, prominent y descent and a diastolic pericardial knock."
            }
        ];

        let activeQuestionIndex = 0;
        let selectedOptionIdx = null;
        let timeRemainingSeconds = 5400;
        let timerIntervalId = null;
        let correctAnswersSum = 0;
        let selectedAnswersMap = {};
        let reviewModeMap = {};

        // DOM Pointers
        const vignetteTextNode = document.getElementById('vignette-container');
        const choicesParentNode = document.getElementById('choices-container');
        const metaFeedbackPanel = document.getElementById('meta-feedback');
        const evalBannerNode = document.getElementById('evaluation-banner');
        const explanationTextNode = document.getElementById('explanation-text');
        const objectiveTextNode = document.getElementById('objective-text');
        const actBtnSubmit = document.getElementById('submit-action-btn');
        const actBtnNext = document.getElementById('next-action-btn');
        const trackerDisplayNode = document.getElementById('tracker-display');
        const progressFillNode = document.getElementById('progress-bar-fill');
        const clockDisplayNode = document.getElementById('clock-display');

        function initTimerCycle() {
            timerIntervalId = setInterval(() => {
                if (timeRemainingSeconds <= 0) {
                    clearInterval(timerIntervalId);
                    finalizeExaminationBlock();
                    return;
                }
                timeRemainingSeconds--;
                const mins = Math.floor(timeRemainingSeconds / 60).toString().padStart(2, '0');
                const secs = (timeRemainingSeconds % 60).toString().padStart(2, '0');
                clockDisplayNode.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function drawActiveQuestion(index) {
            if (index >= questions.length) {
                finalizeExaminationBlock();
                return;
            }
            activeQuestionIndex = index;
            selectedOptionIdx = null;
            const q = questions[index];

            vignetteTextNode.innerText = q.vignette;
            choicesParentNode.innerHTML = "";
            trackerDisplayNode.innerText = `Question ${index + 1} of ${questions.length}`;
            progressFillNode.style.width = `${((index + 1) / questions.length) * 100}%`;

            q.choices.forEach((choice, optIdx) => {
                const li = document.createElement('li');
                const letter = String.fromCharCode(65 + optIdx);
                const isChosen = (selectedAnswersMap[index] === letter);

                li.className = `border p-4 rounded-xl flex items-start gap-3 cursor-pointer transition ${isChosen ? 'border-2 border-blue-600 bg-blue-50/50' : 'border-slate-200 hover:bg-slate-50'}`;
                li.innerHTML = `
                    <span class="w-6 h-6 rounded-md font-bold text-xs flex items-center justify-center shrink-0 font-mono ${isChosen ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}">${letter}</span>
                    <p class="text-sm font-medium text-slate-800">${choice}</p>
                `;

                li.addEventListener('click', () => {
                    if (reviewModeMap[index]?.isSubmitted) return;
                    selectedOptionIdx = optIdx;
                    selectedAnswersMap[index] = letter;
                    drawActiveQuestion(index);
                });
                choicesParentNode.appendChild(li);
            });

            if (reviewModeMap[index]?.isSubmitted) {
                actBtnSubmit.classList.add('hidden');
                actBtnNext.classList.remove('hidden');
                drawMetaFeedback(q, selectedAnswersMap[index]);
            } else {
                actBtnSubmit.classList.remove('hidden');
                actBtnNext.classList.add('hidden');
                metaFeedbackPanel.classList.add('hidden');
            }
        }

        function drawMetaFeedback(q, selection) {
            metaFeedbackPanel.classList.remove('hidden');
            explanationTextNode.innerText = q.explanation;
            objectiveTextNode.innerText = q.objective;
            
            if (selection === q.answerLetter) {
                evalBannerNode.className = "mb-4 p-4 rounded-xl font-bold bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm";
                evalBannerNode.innerText = `Correct! Option ${q.answerLetter} is right.`;
            } else {
                evalBannerNode.className = "mb-4 p-4 rounded-xl font-bold bg-red-50 border border-red-200 text-red-800 text-sm";
                evalBannerNode.innerText = `Incorrect. You selected ${selection || 'None'}. Correct answer is ${q.answerLetter}.`;
            }
        }

        function autoBackupLocally() {
            localStorage.setItem('mcqProgress', JSON.stringify({
                currentQuestion: activeQuestionIndex,
                timeRemaining: timeRemainingSeconds,
                selectedAnswers: selectedAnswersMap,
                reviewMode: reviewModeMap,
                correctAnswersSum: correctAnswersSum
            }));
        }

        window.restoreProgressState = function(state) {
            activeQuestionIndex = state.currentQuestion || 0;
            timeRemainingSeconds = state.timeRemaining !== undefined ? state.timeRemaining : 5400;
            selectedAnswersMap = state.selectedAnswers || {};
            reviewModeMap = state.reviewMode || {};
            correctAnswersSum = state.correctAnswersSum || 0;

            document.getElementById('cloud-sync-alert').classList.add('hidden');
            document.getElementById('resume-btn').classList.add('hidden');
            drawActiveQuestion(activeQuestionIndex);
        };

        function goToDashboard() {
            // Smart routing check to protect against strict GitHub Pages subfolder limits
            const currentPath = window.location.pathname;
            if (currentPath.includes('/cardiovascular/')) {
                window.location.href = '../';
            } else {
                window.location.href = '/cardiovascular';
            }
        }

        window.pauseSession = async function() {
            if (timerIntervalId) clearInterval(timerIntervalId);
            autoBackupLocally();

            if (window.currentUser && typeof window.saveProgressOnline === 'function') {
                const packet = {
                    currentQuestion: activeQuestionIndex,
                    timeRemaining: timeRemainingSeconds,
                    selectedAnswers: selectedAnswersMap,
                    reviewMode: reviewModeMap,
                    correctAnswersSum: correctAnswersSum
                };
                await window.saveProgressOnline(packet);
            }
            
            alert("Session paused! Progress safely backed up.");
            goToDashboard();
        };

        function finalizeExaminationBlock() {
            if (timerIntervalId) clearInterval(timerIntervalId);
            localStorage.removeItem('mcqProgress');
            document.getElementById('qbank-card').classList.add('hidden');
            document.getElementById('end-block-results').classList.remove('hidden');
            document.getElementById('score-text-output').innerText = `${correctAnswersSum} / ${questions.length}`;
        }

        // Action Buttons Click Events
        actBtnSubmit.addEventListener('click', () => {
            if (selectedAnswersMap[activeQuestionIndex] === undefined) {
                alert("Please select an answer first!");
                return;
            }
            const q = questions[activeQuestionIndex];
            reviewModeMap[activeQuestionIndex] = { isSubmitted: true };
            if (selectedAnswersMap[activeQuestionIndex] === q.answerLetter) correctAnswersSum++;

            autoBackupLocally();
            if (window.currentUser && typeof window.saveProgressOnline === 'function') {
                window.saveProgressOnline({
                    currentQuestion: activeQuestionIndex,
                    timeRemaining: timeRemainingSeconds,
                    selectedAnswers: selectedAnswersMap,
                    reviewMode: reviewModeMap,
                    correctAnswersSum: correctAnswersSum
                });
            }
            drawActiveQuestion(activeQuestionIndex);
        });

        actBtnNext.addEventListener('click', () => drawActiveQuestion(activeQuestionIndex + 1));
        document.getElementById('pause-btn-top').addEventListener('click', () => window.pauseSession());
        document.getElementById('resume-btn').addEventListener('click', () => {
            const local = localStorage.getItem('mcqProgress');
            if (local) window.restoreProgressState(JSON.parse(local));
        });

        window.addEventListener('load', () => {
            initTimerCycle();
            if (localStorage.getItem('mcqProgress')) {
                document.getElementById('resume-btn').classList.remove('hidden');
            }
            drawActiveQuestion(0);
        });

        window.addEventListener('authReady', async () => {
            if (typeof window.fetchProgressOnline === 'function') {
                const cloudData = await window.fetchProgressOnline();
                if (cloudData) {
                    document.getElementById('cloud-sync-alert').classList.remove('hidden');
                    document.getElementById('cloud-restore-btn').onclick = () => window.restoreProgressState(cloudData);
                }
            }
        });
    </script>
</body>
</html>
