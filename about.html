<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragments & Echoes — Cinema</title>
    <style>
        :root {
            --bg-color: #08080b;
            --panel-bg: #0d0d15;
            --text-primary: #e4e4ed;
            --text-secondary: #5a5a6e;
            --accent: #a385b9; /* Soft artsy violet */
            --accent-dim: rgba(163, 133, 185, 0.15);
            --nav-bg: rgba(8, 8, 11, 0.9);
            --border: #161622;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden; /* Prevent horizontal scrolling safely */
        }

        /* Fixed Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 2.5rem;
            background: var(--nav-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
        }

        .nav-logo {
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
            opacity: 0.8;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-dim);
        }

        /* Layout Container - Slightly widened to accommodate a gorgeous grid layout */
        main {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding-top: 120px; 
            padding-bottom: 40px;
        }

        .intro-section h2 {
            font-size: 2rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: -0.5px;
            margin-bottom: 1.5rem;
            color: #f0f0f5;
        }

        .intro-section p {
            font-size: 1.05rem;
            color: #b5b5c3;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        /* Cinema Poster Grid Configuration */
        .cinema-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 4px;
            margin-top: 1rem;
        }

        .panel-label {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            display: block;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 0.5rem;
        }

        .poster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            group: hover;
        }

        .poster-wrapper {
            width: 100%;
            aspect-ratio: 2 / 3;
            background-color: #050507;
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
            transition: opacity 0.3s ease;
        }

        .movie-meta {
            margin-top: 0.6rem;
            font-family: 'Georgia', serif;
        }

        .movie-title {
            font-size: 0.9rem;
            font-style: italic;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .movie-year {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.15rem;
        }

        /* Interactive Hover Actions */
        .movie-card:hover .poster-wrapper {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(163, 133, 185, 0.1);
        }

        .movie-card:hover .movie-poster {
            opacity: 1;
        }

        .movie-card:hover .movie-title {
            color: var(--accent);
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding-top: 5rem;
            font-family: monospace;
            font-size: 0.75rem;
            color: rgba(110, 110, 128, 0.3);
            letter-spacing: 1.5px;
            text-align: center;
            width: 100%;
        }

        /* Matched Responsive Navigation System rules */
        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 1.5rem;
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                gap: 1.2rem;
            }

            .nav-links a {
                font-size: 0.75rem;
                letter-spacing: 1px;
            }

            main {
                padding-top: 160px; /* Prevent text hidden behind vertical mobile menu stack */
            }

            .poster-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 1rem;
            }
        }

        @media (max-width: 380px) {
            .nav-links {
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">// f&e</a>
        <ul class="nav-links">
            <li><a href="quotes">Quotes</a></li>
            <li><a href="poems">Poems</a></li>
            <li><a href="cinema" class="active">Cinema</a></li>
            <li><a href="about">About</a></li>
        </ul>
    </nav>

    <main>
        
        <section class="intro-section">
            <h2>cinematic echoes.</h2>
            <p>
                A visual running sequence of frames that stay pinned to the mind long after the room goes quiet.
            </p>
        </section>

        <section class="cinema-panel">
            <span class="panel-label">Projector Log</span>
            
            <div class="poster-grid" id="cinema-grid">
                </div>
        </section>

    </main>

    <footer>
        [ fragments & echoes // transmission terminal ]
    </footer>

    <script>
        /**
         * Dynamic Film Library configuration
         * Find movie paths easily by looking up your title on themoviedb.org
         * Simply copy the image filename from their official poster image.
         */
        const watchList = [
            { title: "In the Mood for Love", year: "2000", tmdbPoster: "/itA6SBA88vS0v87n76n1m9b0ypY.jpg" },
            { title: "Fallen Angels", year: "1995", tmdbPoster: "/uv6966Q6O8B3m69vAThZ83957hA.jpg" },
            { title: "Blade Runner 2049", year: "2017", tmdbPoster: "/g63b36nWhG6766RgghU8660gq7E.jpg" },
            { title: "Chungking Express", year: "1994", tmdbPoster: "/gYpWw07X7g3D698Ksh6Yv790VvY.jpg" }
        ];

        const gridContainer = document.getElementById('cinema-grid');
        const tmdbBaseUrl = "https://image.tmdb.org/t/p/w500"; // TMDb CDN asset layer

        watchList.forEach(movie => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            
            card.innerHTML = `
                <div class="poster-wrapper">
                    <img class="movie-poster" src="${tmdbBaseUrl}${movie.tmdbPoster}" alt="${movie.title} poster" loading="lazy">
                </div>
                <div class="movie-meta">
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-year">${movie.year}</div>
                </div>
            `;
            
            gridContainer.appendChild(card);
        });
    </script>

</body>
</html>
