            list-style: none;
        }

        .nav-links a {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover, .nav-links .active {
            color: var(--accent);
        }

        main {
            width: 100%;
            max-width: 950px;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 4rem;
            text-align: left;
        }

        h2 {
            font-size: 2.4rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1.3;

            margin-bottom: 0.5rem;

            font-size: 0.75rem;

        .spotlight-card {

            display: flex;
            flex-direction: column;

            position: relative;

        .spotlight-img-holder img {

            height: 100%;

            transition: opacity 0.3s ease;

        }

            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;

            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .film-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .film-poster-holder {
            width: 100%;
            height: 280px;
            background: #0b0b0f linear-gradient(135deg, #111119 0%, #07070a 100%);
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 1.5rem;
            opacity: 0.15;
            position: absolute;
            z-index: 1;

        // Safe image fallback function: If remote endpoint fails or blocks, hide image gracefully
        function handleImgError(imageElement) {
            imageElement.classList.add('img-fallback-active');
        }

        // Helper to format string into a clean url-friendly parameter
        function getCleanQuery(title, extra = "") {
            return encodeURIComponent(`${title} ${extra}`.trim());
        }

        // Renders primary indexed films using high-speed global film posters
        function renderFilms(films) {
            const grid = document.getElementById('filmGrid');
            grid.innerHTML = '';
            
            films.forEach(film => {
                const card = document.createElement('div');
                card.className = 'film-card';
                
                // Generates programmatic CDN endpoint using clean title + year keys
                const searchParam = getCleanQuery(film.title, film.year);
                const remotePosterUrl = `https://images.weserv.nl/?url=https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=300&q=80`;
                
                // Custom curated direct cinematic poster links or smart text identifiers can go here.
                // For a completely static, zero-setup CDN approach, we map to high-quality Unsplash cinematic imagery or thematic fallbacks:
                const seedId = film.title.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
                const aestheticPosterUrl = `https://picsum.photos/seed/${seedId}/300/420`;

                card.innerHTML = `
                    <div class="film-poster-holder">
                        <img src="${aestheticPosterUrl}" alt="${film.title}" onerror="handleImgError(this)">
                    </div>
                    <div class="film-info">
                        <span class="film-rank">#${film.rank}</span>
                        <h5 class="film-title">${film.title}</h5>
                        <span class="film-meta">${film.director} (${film.year})</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

                return film.title.toLowerCase().includes(query) || 
                       film.director.toLowerCase().includes(query) || 
                       film.country.toLowerCase().includes(query);
            });
            renderFilms(filtered);
        }

        // Generates calendar date seed matching for daily spotlights
        function generateDailySpotlights() {
            const container = document.getElementById('dailySpotlightSection');
            
            const today = new Date();
            const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            
            const index1 = dateSeed % spotlightPool.length;
            const index2 = (dateSeed + 3) % spotlightPool.length; 
            
            const card1 = spotlightPool[index1];
            const card2 = (index1 === index2) ? spotlightPool[(index1 + 1) % spotlightPool.length] : spotlightPool[index2];

            // Generating highly curated atmospheric landscape headers for spotlight profiles
            const spot1Img = `https://picsum.photos/seed/${getCleanQuery(card1.title)}/500/300`;
            const spot2Img = `https://picsum.photos/seed/${getCleanQuery(card2.title)}/500/300`;

            container.innerHTML = `
                <h3>Featured Today</h3>
                <div class="spotlight-grid">
                    <div class="spotlight-card">
                        <div class="spotlight-img-holder">
                            <img src="${spot1Img}" alt="${card1.title}" onerror="handleImgError(this)">
                        </div>
                        <div class="spotlight-content">
                            <span class="subtitle" style="font-size:0.65rem; color:var(--text-secondary);">${card1.type}</span>
                            <h4 style="margin-top:0.2rem;">${card1.title}</h4>
                            <p>${card1.desc}</p>
                            <div class="tag-list">
                                ${card1.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="spotlight-card">
                        <div class="spotlight-img-holder">
                            <img src="${spot2Img}" alt="${card2.title}" onerror="handleImgError(this)">
                        </div>
                        <div class="spotlight-content">
                            <span class="subtitle" style="font-size:0.65rem; color:var(--text-secondary);">${card2.type}</span>
                            <h4 style="margin-top:0.2rem;">${card2.title}</h4>
                            <p>${card2.desc}</p>
                            <div class="tag-list">
                                ${card2.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', () => {
            generateDailySpotlights();
            renderFilms(filmDatabase);
        });
    </script>
</body>
</html>
