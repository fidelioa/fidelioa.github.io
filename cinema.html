<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Fragments & Echoes // Cinema</title>
    <style>
        :root {
            --bg-color: #08080b;
            --text-primary: #e4e4ed;
            --text-secondary: #5a5a6e;
            --accent: #a385b9; 
            --nav-bg: rgba(8, 8, 11, 0.9);
            --border: #161622;
            --card-bg: #0f0f14;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Georgia', serif;
            line-height: 1.6;
            padding: 140px 2rem 5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 2.5rem;
            background: var(--nav-bg);
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.01);
        }

        .nav-logo {
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
            opacity: 0.8;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover, .nav-links .active {
            color: var(--accent);
        }

        main {
            width: 100%;
            max-width: 950px;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 4rem;
            text-align: left;
        }

        h2 {
            font-size: 2.4rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1.3;
            color: #f0f0f5;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        section {
            margin-bottom: 4rem;
        }

        h3 {
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .spotlight-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .spotlight-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .spotlight-img-holder {
            width: 100%;
            height: 180px;
            background-color: #0b0b0f;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .spotlight-img-holder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .spotlight-card:hover .spotlight-img-holder img {
            opacity: 0.8;
        }

        .spotlight-content {
            padding: 1.5rem;
        }

        .spotlight-card h4 {
            font-size: 1.2rem;
            font-weight: normal;
            font-style: italic;
            margin-bottom: 0.6rem;
            color: #e4e4ed;
        }

        .spotlight-card p {
            font-size: 0.95rem;
            color: #9a9aa8;
            margin-bottom: 1.2rem;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            font-family: monospace;
            font-size: 0.75rem;
            background: rgba(163, 133, 185, 0.08);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 2px;
        }

        .search-container {
            margin-bottom: 2.5rem;
            width: 100%;
        }

        #searchBar {
            width: 100%;
            padding: 1rem 1.5rem;
            font-family: 'Georgia', serif;
            font-size: 1.05rem;
            font-style: italic;
            color: var(--text-primary);
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        #searchBar:focus {
            border-color: var(--accent);
        }

        .film-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .film-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .film-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .film-poster-holder {
            width: 100%;
            height: 290px;
            background-color: #0b0b0f;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .film-poster-holder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .film-card:hover .film-poster-holder img {
            opacity: 0.98;
            transform: scale(1.02);
        }

        .film-info {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .film-rank {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }

        .film-title {
            font-size: 1rem;
            font-weight: normal;
            line-height: 1.4;
            color: #e4e4ed;
            margin-bottom: 0.5rem;
        }

        .film-meta {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: auto;
        }

        .poster-fallback-bg {
            background: linear-gradient(180deg, #12121a 0%, #08080c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .poster-fallback-text {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            padding: 1rem;
        }

        footer {
            margin-top: auto;
            padding-top: 4rem;
            font-family: monospace;
            font-size: 0.75rem;
            color: rgba(110, 110, 128, 0.3);
            letter-spacing: 1.5px;
            text-align: center;
            width: 100%;
        }

        @media (max-width: 600px) {
            body { padding-top: 100px; }
            .film-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .film-poster-holder { height: 210px; }
        }
    </style>

        // The Anonymous Routing Tunnel
        const proxyPrefix = "https://external-content.duckduckgo.com/iu/?u=";

        function handleImgError(imageElement, title) {
            const parent = imageElement.parentElement;
            imageElement.style.display = 'none';
            if(parent) {
                parent.classList.add('poster-fallback-bg');
                parent.innerHTML = `<span class="poster-fallback-text">${title}</span>`;
            }
        }

        function renderFilms(films) {
            const grid = document.getElementById('filmGrid');
            grid.innerHTML = '';
            
            films.forEach(film => {
                const card = document.createElement('div');
                card.className = 'film-card';
                
                // Wrap target URL inside the DuckDuckGo proxy to force clear delivery bypass
                let securePosterUrl = `${proxyPrefix}${encodeURIComponent(film.img)}`;

                card.innerHTML = `
                    <div class="film-poster-holder">
                        <img src="${securePosterUrl}" alt="${film.title}" onerror="handleImgError(this, '${film.title.replace(/'/g, "\\'")}')">
                    </div>
                    <div class="film-info">
                        <span class="film-rank">#${film.rank}</span>
                        <h5 class="film-title">${film.title}</h5>
                        <span class="film-meta">${film.director} (${film.year})</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterFilms() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = filmDatabase.filter(film => {
                return film.title.toLowerCase().includes(query) || 
                       film.director.toLowerCase().includes(query) || 
                       film.country.toLowerCase().includes(query);
            });
            renderFilms(filtered);
        }

        function generateDailySpotlights() {
            const container = document.getElementById('dailySpotlightSection');
            
            const today = new Date();
            const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            
            const index1 = dateSeed % spotlightPool.length;
            const index2 = (dateSeed + 2) % spotlightPool.length; 
            
            const card1 = spotlightPool[index1];
            const card2 = (index1 === index2) ? spotlightPool[(index1 + 1) % spotlightPool.length] : spotlightPool[index2];

            const spot1Img = `${proxyPrefix}${encodeURIComponent(card1.img)}`;
            const spot2Img = `${proxyPrefix}${encodeURIComponent(card2.img)}`;

            container.innerHTML = `
                <h3>Featured Today</h3>
                <div class="spotlight-grid">
                    <div class="spotlight-card">
                        <div class="spotlight-img-holder">
                            <img src="${spot1Img}" alt="${card1.title}" onerror="handleImgError(this, '${card1.title.replace(/'/g, "\\'")}')">
                        </div>
                        <div class="spotlight-content">
                            <span class="subtitle" style="font-size:0.65rem; color:var(--text-secondary);">${card1.type}</span>
                            <h4 style="margin-top:0.2rem;">${card1.title}</h4>
                            <p>${card1.desc}</p>
                            <div class="tag-list">
                                ${card1.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="spotlight-card">
                        <div class="spotlight-img-holder">
                            <img src="${spot2Img}" alt="${card2.title}" onerror="handleImgError(this, '${card2.title.replace(/'/g, "\\'")}')">
                        </div>
                        <div class="spotlight-content">
                            <span class="subtitle" style="font-size:0.65rem; color:var(--text-secondary);">${card2.type}</span>
                            <h4 style="margin-top:0.2rem;">${card2.title}</h4>
                            <p>${card2.desc}</p>
                            <div class="tag-list">
                                ${card2.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', () => {
            generateDailySpotlights();
            renderFilms(filmDatabase);
        });
