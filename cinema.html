<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragments & Echoes — Cinema</title>
    <style>
        :root {
            --bg-color: #08080b;
            --text-primary: #e4e4ed;
            --text-secondary: #5a5a6e;
            --accent: #a385b9; /* Soft artsy violet */
            --accent-dim: rgba(163, 133, 185, 0.15);
            --nav-bg: rgba(8, 8, 11, 0.9);
            --border: #161622;
            --card-bg: rgba(18, 18, 26, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Fixed Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 2.5rem;
            background: var(--nav-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
        }

        .nav-logo {
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
            opacity: 0.8;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-dim);
        }

        /* Structured Main Layout Container */
        main {
            width: 100%;
            max-width: 900px; 
            padding-top: 120px; 
            padding-bottom: 40px;
        }

        header {
            margin-bottom: 4rem;
            text-align: left;
        }

        h2 {
            font-size: 2.4rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1.3;
            color: #f0f0f5;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        section {
            margin-bottom: 4rem;
            width: 100%;
        }

        h3 {
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .spotlight-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .spotlight-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .spotlight-header-holder {
            width: 100%;
            background: linear-gradient(180deg, #12121a 0%, #0b0b0f 100%);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .spotlight-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .spotlight-card h4 {
            font-size: 1.3rem;
            font-weight: normal;
            font-style: italic;
            color: #e4e4ed;
        }

        .spotlight-card p {
            font-size: 0.95rem;
            color: #9a9aa8;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: auto;
        }

        .tag {
            font-family: monospace;
            font-size: 0.75rem;
            background: rgba(163, 133, 185, 0.08);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 2px;
        }

        .search-container {
            margin-bottom: 2.5rem;
            width: 100%;
        }

        #searchBar {
            width: 100%;
            padding: 1rem 1.5rem;
            font-family: 'Georgia', serif;
            font-size: 1.05rem;
            font-style: italic;
            color: var(--text-primary);
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        #searchBar:focus {
            border-color: var(--accent);
        }

        .film-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .film-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .film-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .film-poster-holder {
            width: 100%;
            height: 290px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            position: relative;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .film-info {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .film-rank {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }

        .film-meta {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: auto;
        }

        footer {
            margin-top: auto;
            padding-top: 4rem;
            font-family: monospace;
            font-size: 0.75rem;
            color: rgba(110, 110, 128, 0.3);
            letter-spacing: 1.5px;
            text-align: center;
            width: 100%;
        }

        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 1.5rem;
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links { gap: 1.2rem; }
            .nav-links a { font-size: 0.75rem; letter-spacing: 1px; }
            main { padding-top: 160px; }
        }

        @media (max-width: 600px) {
            .film-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .film-poster-holder { height: 210px; padding: 1rem; }
            h2 { font-size: 2rem; }
        }
    </style>
</head>

        const spotlightPool = [
            {
                type: "Director Spotlight",
                title: "The Coen Brothers",
                desc: "An obsession with structural ironies, deadpan fatalism, and regular folks stumbling into beautifully complex moral quicksands.",
                tags: ["Fargo (#09)", "The Big Lebowski (#49)", "Inside Llewyn Davis (#79)"]
            },
            {
                type: "Director Spotlight",
                title: "Mike Leigh",
                desc: "Unvarnished, improvisational slices of human friction. Masterful observation of quiet desperation and profound tenderness in British landscapes.",
                tags: ["Naked", "Secrets & Lies"]
            },
            {
                type: "Aesthetic Constants",
                title: "The Tilda Swinton Presence",
                desc: "Chameleonic, architectural, and thoroughly alien. Tracking a fascination with performances that transcend traditional character work into pure presence.",
                tags: ["The Zone of Interest (#67)"]
            },
            {
                type: "Director Spotlight",
                title: "Asghar Farhadi",
                desc: "Intense, localized micro-dramas where simple misunderstandings escalate into profound systemic and moral breakdowns.",
                tags: ["A Separation (#11)", "About Elly (#36)"]
            }
        ];

        function renderFilms(films) {
            const grid = document.getElementById('filmGrid');
            grid.innerHTML = '';
            
            films.forEach(film => {
                const card = document.createElement('div');
                card.className = 'film-card';

                card.innerHTML = `
                    <div class="film-poster-holder" style="background-image: linear-gradient(180deg, rgba(14, 14, 20, 0.5) 0%, rgba(8, 8, 11, 0.85) 100%), url('${film.poster}');">
                        <span class="subtitle" style="font-size: 0.65rem; color: var(--accent); opacity: 0.7;">[ ${film.country} ]</span>
                        <h4 style="font-family: 'Georgia', serif; font-style: italic; font-weight: normal; font-size: 1.25rem; line-height: 1.3; color: #f0f0f5; margin-top: auto; margin-bottom: auto; text-shadow: 0 2px 4px rgba(0,0,0,0.95); z-index: 2;">${film.title}</h4>
                        <span style="font-family: monospace; font-size: 0.7rem; color: var(--text-secondary); text-align: right; text-shadow: 0 1px 2px rgba(0,0,0,0.95); z-index: 2;">${film.year}</span>
                    </div>
                    <div class="film-info">
                        <span class="film-rank">#${film.rank}</span>
                        <span class="film-meta" style="color: var(--text-primary); font-weight: 500;">${film.director}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterFilms() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = filmDatabase.filter(film => {
                return film.title.toLowerCase().includes(query) || 
                       film.director.toLowerCase().includes(query) || 
                       film.country.toLowerCase().includes(query);
            });
            renderFilms(filtered);
        }

        function generateDailySpotlights() {
            const container = document.getElementById('dailySpotlightSection');
            const today = new Date();
            const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            
            const index1 = dateSeed % spotlightPool.length;
            const index2 = (dateSeed + 2) % spotlightPool.length; 
            
            const card1 = spotlightPool[index1];
            const card2 = (index1 === index2) ? spotlightPool[(index1 + 1) % spotlightPool.length] : spotlightPool[index2];

            container.innerHTML = `
                <h3>Featured Today</h3>
                <div class="spotlight-grid">
                    <div class="spotlight-card">
                        <div class="spotlight-header-holder">
                            <div>
                                <span class="subtitle" style="font-size:0.65rem; color:var(--accent);">${card1.type}</span>
                                <h4 style="margin-top:0.2rem;">${card1.title}</h4>
                            </div>
                        </div>
                        <div class="spotlight-content">
                            <p>${card1.desc}</p>
                            <div class="tag-list">
                                ${card1.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="spotlight-card">
                        <div class="spotlight-header-holder">
                            <div>
                                <span class="subtitle" style="font-size:0.65rem; color:var(--accent);">${card2.type}</span>
                                <h4 style="margin-top:0.2rem;">${card2.title}</h4>
                            </div>
                        </div>
                        <div class="spotlight-content">
                            <p>${card2.desc}</p>
                            <div class="tag-list">
                                ${card2.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', () => {
            generateDailySpotlights();
            renderFilms(filmDatabase);
        });
    </script>
